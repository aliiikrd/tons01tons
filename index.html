<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    ============================================================================
      Telegram Mini App  -  Ad Gateway for @AllSocialSaversbot
      Developed by @whykurds
    ============================================================================

      PURPOSE:
      This page is opened inside Telegram's built-in WebView when the user
      taps the "Watch Ad & Download" inline button.  It displays a Monetag
      Rewarded Interstitial ad.  Once the ad is completed, it sends
      "ad_completed" back to the bot via Telegram.WebApp.sendData().

      FLOW:
      1. Page loads  ->  Telegram WebApp SDK initializes  ->  Monetag SDK loads.
      2. User taps the "Watch Ad" button.
      3. A loading overlay with spinner appears.
      4. Monetag Rewarded Interstitial is triggered (show_XXXXX()).
      5. On success (.then)  ->  sendData("ad_completed")  ->  close Mini App.
      6. On failure (.catch) ->  hide overlay  ->  show error message.

      SCRIPTS LOADED:
      - telegram-web-app.js   : Official Telegram WebApp SDK (provides
                                Telegram.WebApp object for theme, sendData, close).
      - Monetag SDK script    : Loaded via <script> tag with data-zone and data-sdk
                                attributes.  Creates a global show_XXXXX() function.
      - script.js             : Our custom logic that ties everything together.
      - style.css             : All styling, animations, and responsive layout.
    ============================================================================
    -->

    <meta charset="UTF-8">

    <!-- Viewport meta tag - CRITICAL for mobile-first responsive design.
         Telegram Mini Apps run exclusively on mobile devices, so we must
         ensure proper scaling and prevent unwanted zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>All Social Saver - Watch Ad</title>

    <!-- ================================================================== -->
    <!--  TELEGRAM WEBAPP SDK                                                -->
    <!-- ================================================================== -->
    <!--
      This is the OFFICIAL Telegram WebApp JavaScript SDK.
      It MUST be loaded BEFORE any other scripts that use Telegram.WebApp.

      What it provides:
      - Telegram.WebApp.ready()      : Tells Telegram the Mini App is loaded.
      - Telegram.WebApp.sendData()   : Sends a string back to the bot.
      - Telegram.WebApp.close()      : Closes the Mini App WebView.
      - Telegram.WebApp.themeParams  : Current Telegram theme colors.
      - Telegram.WebApp.initDataUnsafe.user : Info about the current user.

      IMPORTANT: Monetag docs recommend loading the Telegram SDK so that the
      Monetag SDK can detect safe visual areas and position UI elements
      (like the ad close button) correctly.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- ================================================================== -->
    <!--  MONETAG SDK  (Rewarded Interstitial)                               -->
    <!-- ================================================================== -->
    <!--
      This script tag loads the Monetag SDK and creates a global function
      named "show_XXXXX" (where XXXXX is your zone ID).

      ATTRIBUTES:
      - src          : The SDK JavaScript file URL from your Monetag dashboard.
      - data-zone    : Your Monetag main zone ID (get it from your dashboard).
      - data-sdk     : The name of the global function the SDK creates.
                       Convention is "show_" followed by the zone ID.

      REPLACE THESE PLACEHOLDERS:
      - Replace "XXXXX" in data-zone with your actual Monetag zone ID.
      - Replace "XXXXX" in data-sdk with "show_" + your zone ID.
      - Replace the src URL with the actual SDK URL from your Monetag dashboard.

      After loading, you can call show_XXXXX() anywhere in your JavaScript
      to trigger a Rewarded Interstitial ad.

      The function returns a Promise:
        .then()  -> ad was watched successfully (reward the user)
        .catch() -> ad failed, was skipped, or is unavailable
    -->
    <script
        src="https://yourdomain.com/sdk.js"
        data-zone="XXXXX"
        data-sdk="show_XXXXX"
    ></script>
    <!--
      !! IMPORTANT !!
      The src, data-zone, and data-sdk values above are PLACEHOLDERS.
      You MUST replace them with the actual values from your Monetag dashboard.

      Steps to get your values:
      1. Log in to https://publishers.monetag.com
      2. Go to "Telegram Mini Apps" tab
      3. Add your app (the Vercel URL)
      4. Click "Get SDK" to generate your tags
      5. Copy the script tag and replace the one above

      Example of what a real tag looks like:
      <script
          src="https://poweredby.jads.co/js/sdk.js"
          data-zone="987654"
          data-sdk="show_987654"
      ></script>
    -->

    <!-- Our custom stylesheet - loaded after SDKs to ensure our styles apply -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ================================================================== -->
    <!--  MAIN CONTAINER  -  The card UI shown to the user                   -->
    <!-- ================================================================== -->
    <!--
      The page structure:
      - .container     : Full-screen flex container for centering
      - .card          : The glassmorphism card with backdrop blur
      - .card-icon     : Animated download icon at the top
      - .card-title    : Main heading
      - .card-text     : Instructions for the user
      - #watchAdBtn    : The glowing CTA button that triggers the ad
      - .card-footer   : Credit text at the bottom of the card
      - #errorMsg      : Hidden by default, shown when ad fails
    -->

    <div class="container">
        <div class="card">

            <!-- Animated icon - a download arrow that pulses -->
            <div class="card-icon">
                <!-- SVG download icon - inline so we can style it with CSS -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" class="icon-svg">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </div>

            <!-- Title -->
            <h1 class="card-title">Almost There!</h1>

            <!-- Instruction text -->
            <p class="card-text">
                Watch a short ad to unlock your download.
                <br>
                Your file will be sent to you right after!
            </p>

            <!-- CTA Button - triggers the Monetag ad -->
            <button id="watchAdBtn" class="btn-glow" type="button">
                Watch Ad & Download
            </button>

            <!-- Error message - hidden by default, shown on ad failure -->
            <div id="errorMsg" class="error-message" style="display: none;">
                Ad is not available right now. Please try again in a moment.
            </div>

            <!-- Footer credit -->
            <p class="card-footer">
                Powered by <strong>@AllSocialSaversbot</strong>
                <br>
                <span class="dev-credit">Developed by @whykurds</span>
            </p>
        </div>
    </div>

    <!-- ================================================================== -->
    <!--  LOADING OVERLAY  -  Shown while the ad is loading/playing          -->
    <!-- ================================================================== -->
    <!--
      This overlay covers the entire screen with a semi-transparent backdrop
      and a centered spinner.  It provides visual feedback that something
      is happening (the ad is loading).

      - #loadingOverlay : The full-screen overlay container.
      - .spinner        : A CSS-animated spinning circle.
      - Text below the spinner tells the user to wait.

      Visibility is controlled via JavaScript:
        show: overlay.style.display = 'flex'
        hide: overlay.style.display = 'none'
    -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p class="loading-text">Loading ad, please wait...</p>
    </div>

    <!-- ================================================================== -->
    <!--  SUCCESS OVERLAY  -  Briefly shown after ad completes               -->
    <!-- ================================================================== -->
    <!--
      After the ad completes successfully, we briefly show a checkmark
      animation before sending data and closing the Mini App.
      This gives the user positive visual feedback.
    -->
    <div id="successOverlay" class="success-overlay" style="display: none;">
        <div class="checkmark-circle">
            <!-- SVG checkmark icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="3" stroke-linecap="round"
                 stroke-linejoin="round" class="checkmark-svg">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <p class="success-text">Ad complete! Sending your file...</p>
    </div>

    <!-- ================================================================== -->
    <!--  OUR CUSTOM SCRIPT  -  Loaded last so the DOM is ready              -->
    <!-- ================================================================== -->
    <script src="script.js"></script>
</body>
</html>
